<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Three.js Model Viewer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lux/bootstrap.min.css" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- UI PANEL -->
  <div id="ui-panel" class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white fw-bold">
      3D Model Viewer
    </div>

    <div class="card-body">
      <p class="small mb-3">
        Supported:<br>
        <strong>GLTF, GLB, OBJ, FBX, STL, PLY, 3MF</strong>
      </p>

      <input type="file" id="fileInput" class="form-control mb-3"
        accept=".glb,.gltf,.obj,.fbx,.stl,.ply,.3mf"/>

      <hr>

      <h6 class="fw-bold mb-2">Lighting</h6>

      <label class="form-label small">Directional Light Color</label>
      <input type="color" id="lightColor" class="form-control form-control-color mb-2" value="#ffffff">

      <label class="form-label small">Directional Intensity</label>
      <input type="range" id="dirIntensity" class="form-range mb-2" min="0" max="2" step="0.05" value="1">

      <label class="form-label small">Ambient Intensity</label>
      <input type="range" id="ambIntensity" class="form-range mb-3" min="0" max="1" step="0.05" value="0.4">

      <hr>

      <h6 class="fw-bold mb-2">View</h6>

      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="btnSwitch">
        <label class="form-check-label small">Dark Mode</label>
      </div>

      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="gridToggle" checked>
        <label class="form-check-label small">Grid Floor</label>
      </div>

      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="wireToggle">
        <label class="form-check-label small">Wireframe</label>
      </div>

      <button id="resetBtn" class="btn btn-danger btn-sm w-100">
        Reset Scene
      </button>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div id="stats-panel" class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white fw-bold">
      Scene Stats
    </div>

    <div class="card-body small">
      Meshes: <span id="meshCount">0</span><br>
      Vertices: <span id="vertexCount">0</span><br>
      Triangles: <span id="triangleCount">0</span>
    </div>
  </div>

  <!-- THREE.JS -->
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

  <script src="https://unpkg.com/fflate@0.8.2/umd/index.js"></script>

  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/3MFLoader.js"></script>

  <!-- Main JS -->
  <script src="script.js"></script>

</body>
</html>
